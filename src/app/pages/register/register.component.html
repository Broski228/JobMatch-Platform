<div class="page-bg auth-wrap">
  <div class="glass panel register-card">
    <h1>Регистрация</h1>
    <div class="methods-grid">
      <button *ngFor="let item of methods" class="method-btn" [class.active]="method === item.id" (click)="selectMethod(item.id)" type="button">
        {{ item.label }}
      </button>
    </div>
    <div class="form-grid">
      <input class="form-control" [(ngModel)]="login" placeholder="Логин">
      <input class="form-control" [(ngModel)]="password" type="password" placeholder="Пароль">
      <input class="form-control" [(ngModel)]="name" placeholder="Имя">
      <input class="form-control" [(ngModel)]="surname" placeholder="Фамилия">
      <input class="form-control" [(ngModel)]="patronymic" placeholder="Отчество">
      <input class="form-control" [(ngModel)]="email" placeholder="Почта">
      <input class="form-control" [(ngModel)]="phone" placeholder="Номер телефона">
      <input class="form-control" [(ngModel)]="address" placeholder="Адрес проживания">
      <select class="form-control" [(ngModel)]="role">
        <option value="worker">Работник</option>
        <option value="employer">Работодатель</option>
      </select>
      <input *ngIf="role === 'employer'" class="form-control" [(ngModel)]="company" placeholder="Название компании">
    </div>
    <button class="main-btn light full" (click)="submit()">Создать аккаунт</button>
    <a routerLink="/login">Уже есть аккаунт? Войти</a>
  </div>
</div>
